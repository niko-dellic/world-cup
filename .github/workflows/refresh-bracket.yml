name: Refresh bracket

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:

jobs:
  refresh-bracket:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call refresh endpoint
        run: |
          : "${APP_URL:?APP_URL secret is required}"
          : "${REFRESH_SECRET:?REFRESH_SECRET secret is required}"

          curl --fail-with-body \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            --connect-timeout 10 \
            --max-time 60 \
            --request POST \
            --header "Authorization: Bearer $REFRESH_SECRET" \
            "${APP_URL%/}/api/refresh-bracket"
        env:
          APP_URL: ${{ secrets.APP_URL }}
          REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}
